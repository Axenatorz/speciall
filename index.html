<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>semangatttt cesaaa❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="progress-bar" id="progressBar" aria-hidden="true">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="ambient-layer" id="ambientLayer" aria-hidden="true"></div>
    <button
      class="music-toggle"
      id="musicToggle"
      type="button"
      aria-pressed="false"
      aria-label="Aktifkan musik"
    >
      <span class="eq" aria-hidden="true"
        ><span></span><span></span><span></span
      ></span>
    </button>

    <div class="wrap">
      <!-- COVER -->
      <section class="cover" id="cover">
        <svg
          class="corner-flourish corner-flourish--tl"
          viewBox="0 0 100 100"
          aria-hidden="true"
        >
          <path
            d="M5,95 C15,70 10,40 35,15"
            stroke="currentColor"
            stroke-width="1.4"
            fill="none"
            stroke-linecap="round"
          />
          <ellipse
            cx="18"
            cy="70"
            rx="6"
            ry="3"
            transform="rotate(-40 18 70)"
            fill="currentColor"
          />
          <ellipse
            cx="24"
            cy="50"
            rx="6"
            ry="3"
            transform="rotate(-20 24 50)"
            fill="currentColor"
          />
          <ellipse
            cx="30"
            cy="30"
            rx="6"
            ry="3"
            transform="rotate(10 30 30)"
            fill="currentColor"
          />
          <circle cx="35" cy="15" r="3" fill="currentColor" />
        </svg>
        <svg
          class="corner-flourish corner-flourish--br"
          viewBox="0 0 100 100"
          aria-hidden="true"
        >
          <path
            d="M5,95 C15,70 10,40 35,15"
            stroke="currentColor"
            stroke-width="1.4"
            fill="none"
            stroke-linecap="round"
          />
          <ellipse
            cx="18"
            cy="70"
            rx="6"
            ry="3"
            transform="rotate(-40 18 70)"
            fill="currentColor"
          />
          <ellipse
            cx="24"
            cy="50"
            rx="6"
            ry="3"
            transform="rotate(-20 24 50)"
            fill="currentColor"
          />
          <ellipse
            cx="30"
            cy="30"
            rx="6"
            ry="3"
            transform="rotate(10 30 30)"
            fill="currentColor"
          />
          <circle cx="35" cy="15" r="3" fill="currentColor" />
        </svg>

        <div class="cover-inner">
          <p class="eyebrow">Cuma surat kecil</p>
          <h1 class="cover-title">princess cesaaa,</h1>
          <p class="cover-sub">ehh Princess cesa yang bewell deng🤣.</p>

          <div class="envelope-wrap">
            <button
              class="envelope-btn"
              id="envelopeBtn"
              aria-label="Buka surat"
            >
              <span class="envelope-base"></span>
              <span class="envelope-flap"></span>
              <span class="envelope-seal">♥</span>
            </button>
          </div>
          <p class="tap-hint">👆 Click Amplopnya untuk membuka</p>
        </div>
      </section>

      <!-- CONTENT -->
      <main class="content" id="content" aria-hidden="true">
        <p class="intro-line" style="font-size: 26px">
          Ini bukan surat panjang. Cuma beberapa hal kecil yang mau aku bilang,
          satu per satu.
        </p>

        <div class="divider" aria-hidden="true">
          <span class="divider-line"></span>
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
          >
            <path
              d="M12 20s-7-4.35-9.5-8.5C0.5 7.5 3 4 6.5 4c2 0 3.5 1.2 4.5 2.7C12 5.2 13.5 4 15.5 4 19 4 21.5 7.5 19.5 11.5 17 15.65 12 20 12 20z"
            />
          </svg>
          <span class="divider-line"></span>
        </div>

        <div class="notes" id="notesContainer"></div>

        <div class="divider" aria-hidden="true">
          <span class="divider-line"></span>
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
          >
            <path
              d="M12 20s-7-4.35-9.5-8.5C0.5 7.5 3 4 6.5 4c2 0 3.5 1.2 4.5 2.7C12 5.2 13.5 4 15.5 4 19 4 21.5 7.5 19.5 11.5 17 15.65 12 20 12 20z"
            />
          </svg>
          <span class="divider-line"></span>
        </div>

        <footer class="closing">
          <p class="closing-line">
            Semangat teruss cesaaaa jgn gampang menyerah okayyy👌🩶
          </p>

          <button class="heart-btn" id="heartBtn">Click Dong</button>
          <p class="thanks-note" id="thanksNote" hidden>
            Makasih yaa udah baca sampai sini🤗.
          </p>
        </footer>
      </main>
    </div>

    <div class="hearts-layer" id="heartsLayer" aria-hidden="true"></div>

    <!--
      GANTI MUSIK DI SINI:
      Taruh file MP3 kamu di folder yang SAMA dengan file index.html ini,
      lalu ganti "musik.mp3" di bawah dengan nama file musikmu.
      Contoh: kalau file musikmu bernama "lagu-kita.mp3", ubah jadi src="lagu-kita.mp3"
    -->
    <audio id="bgMusic" src="Who Knows.mp3" loop preload="auto"></audio>

    <script src="main.js"></script>
  </body>
</html>
